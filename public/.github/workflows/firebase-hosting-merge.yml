name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: firebase deploy --only hosting:bykalancha
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_SERVICE_ACCOUNT_BYKALANCHA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BYKALANCHA }}
